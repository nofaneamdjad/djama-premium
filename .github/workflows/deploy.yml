name: Deploy to Vercel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          DEPLOY_HOOK: "https://api.vercel.com/v1/integrations/deploy/prj_1BoxHAp3b9siZQbcIymehXhnSMGM/QZH0FAF3cv"
        run: curl -fsSL -X POST "$DEPLOY_HOOK"
